<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Scanner</title>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; background: #f5f5f5; }
    #qr-reader { width: 300px; margin: auto; }
    #status { margin-top: 12px; font-size: 1em; color: #555; }
  </style>
</head>
<body>
  <h2>📷 Aponte para o QR Code</h2>
  <div id="qr-reader"></div>
  <div id="status">Aguardando leitura...</div>

  <script>
    let ultimoLido = "";

    function onScanSuccess(decodedText) {
      if (decodedText === ultimoLido) return;
      ultimoLido = decodedText;

      document.getElementById("status").innerText = "✅ Lido! Enviando...";

      // Envia o resultado de volta para quem abriu este popup
      if (window.opener) {
        window.opener.postMessage({ qrcode: decodedText }, "*");
      }

      // Fecha o popup após 1 segundo
      setTimeout(() => window.close(), 1000);
    }

    const scanner = new Html5QrcodeScanner("qr-reader", {
      fps: 10,
      qrbox: { width: 250, height: 250 }
    });
    scanner.render(onScanSuccess);
  </script>
</body>
</html>
